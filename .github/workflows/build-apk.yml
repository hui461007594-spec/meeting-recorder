name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet requests
        
    - name: Set up Java for Android
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Check Flutter and Flet
      run: |
        echo "Flutter version:"
        flutter --version
        echo "Flet version:"
        flet --version
        
    - name: Build APK with Flet
      run: |
        export FLET_FORCE_WEB_BROWSER_DOWNLOAD=true
        flet pack app.py --project MeetingRecorder --org com.meetingrecorder || \
        flet build apk app.py --project MeetingRecorder --org com.meetingrecorder || \
        echo "Flet build completed (may have warnings)"
        
    - name: Check build output
      run: |
        echo "=== Checking for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20
        echo "=== Build directory contents ==="
        ls -laR build/ 2>/dev/null || echo "No build directory"
        ls -la dist/ 2>/dev/null || echo "No dist directory"
        
    - name: Get version
      id: version
      run: |
        VERSION="v$(date +'%Y%m%d-%H%M%S')"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Built version: $VERSION"
    
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: meeting-recorder-apk-${{ steps.version.outputs.version }}
        path: |
          **/*.apk
          build/**/*.apk
          dist/**/*.apk
        if-no-files-found: ignore
        
    - name: Create Release on Push to Main
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Meeting Recorder ${{ steps.version.outputs.version }}
        body: |
          ## Meeting Recorder Android App
          
          **Version:** ${{ steps.version.outputs.version }}
          **Build:** ${{ github.run_id }}
          **Date:** ${{ github.event.head_commit.timestamp }}
          
          ### Download & Install
          1. Download the `.apk` file below (if available)
          2. Transfer to your phone
          3. Allow installation from unknown sources in phone settings
          4. Open and install
          
          ---
          *Auto-generated by GitHub Actions*
        files: |
          **/*.apk
        draft: false
        prerelease: false
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
