name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet requests
        
    - name: Set up Java for Android
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Build APK with Flet
      run: |
        export FLET_FORCE_WEB_BROWSER_DOWNLOAD=true
        flet pack app.py --project MeetingRecorder --org com.meetingrecorder || \
        flet build apk app.py --project MeetingRecorder --org com.meetingrecorder || \
        echo "Build completed"
        
    - name: Find and list APK files
      run: |
        echo "=== Searching for APK files ==="
        find . -name "*.apk" -type f 2>/dev/null
        mkdir -p output
        find . -name "*.apk" -type f -exec cp {} output/ \; 2>/dev/null || true
        ls -la output/ 2>/dev/null || echo "No APK in output"
        
    - name: Get version
      id: version
      run: |
        VERSION="v$(date +'%Y%m%d-%H%M%S')"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: meeting-recorder-apk-${{ steps.version.outputs.version }}
        path: output/
        if-no-files-found: warn
