name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet requests
        
    - name: Set up Java for Android
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Accept Android licenses and setup SDK
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
        
    - name: Build APK with Flet (auto-confirm)
      env:
        FLET_FORCE_WEB_BROWSER_DOWNLOAD: "true"
      run: |
        echo "y" | flet pack app.py --project MeetingRecorder --org com.meetingrecorder 2>&1 || \
        echo "y" | flet build apk app.py --project MeetingRecorder --org com.meetingrecorder 2>&1 || \
        echo "Build attempt completed"
        
    - name: Find and list all files
      run: |
        echo "=== Project structure ==="
        find . -maxdepth 3 -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null
        echo "=== Build directory ==="
        ls -laR build/ 2>/dev/null || echo "No build dir"
        echo "=== Dist directory ==="
        ls -laR dist/ 2>/dev/null || echo "No dist dir"
        echo "=== Root APK/AAB files ==="
        ls -la *.apk *.aab 2>/dev/null || echo "None in root"
        
    - name: Get version
      id: version
      run: |
        VERSION="v$(date +'%Y%m%d-%H%M%S')"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Upload any build outputs as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: meeting-recorder-build-${{ steps.version.outputs.version }}
        path: |
          **/*.apk
          **/*.aab
          build/**
          dist/**
        if-no-files-found: warn
