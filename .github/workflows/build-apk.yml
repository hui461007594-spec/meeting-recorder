name: Build APK

on:
  push:
    branches: [ main ]
    pull_request:
      branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet requests
        
    - name: Set up Java for Android
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        
    - name: Build APK with Flet
      run: |
        export FLET_FORCE_WEB_BROWSER_DOWNLOAD=true
        flet build apk app.py --project MeetingRecorder --org com.meetingrecorder || echo "Build attempted"
        
    - name: Check build output
      run: |
        echo "Checking build directory..."
        ls -la build/ 2>/dev/null || echo "No build directory"
        find . -name "*.apk" 2>/dev/null || echo "No APK found"
        
    - name: Get version
      id: version
      run: |
        VERSION="v$(date +'%Y%m%d-%H%M%S')"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Built version: $VERSION"
    
    - name: Upload APK as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: meeting-recorder-apk-${{ steps.version.outputs.version }}
        path: build/apk/*.apk
        if-no-files-found: warn
        
    - name: Create Release on Push to Main
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: Meeting Recorder ${{ steps.version.outputs.version }}
        body: |
          ## Meeting Recorder Android App
          
          **Version:** ${{ steps.version.outputs.version }}
          **Build:** ${{ github.run_id }}
          **Date:** ${{ github.event.head_commit.timestamp }}
          
          ### Download & Install
          1. Download the `.apk` file below (if available)
          2. Transfer to your phone
          3. Allow installation from unknown sources in phone settings
          4. Open and install
          
          ### Usage
          1. Start backend server on PC: `python mobile_backend.py`
          2. Get PC IP address: `ipconfig`
          3. Enter IP in app: `http://YOUR_IP:5000`
          4. Select audio file and process
          
          ---
          *Auto-generated by GitHub Actions*
        files: build/apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: $${{ secrets.GITHUB_TOKEN }}
